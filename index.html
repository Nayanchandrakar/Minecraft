<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxelCraft</title>
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Silkscreen', monospace; }
        #game-canvas { display: block; }
        
        #crosshair {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none; z-index: 100;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: #fff;
        }
        #crosshair::before { width: 2px; height: 20px; left: 50%; top: 50%; transform: translate(-50%, -50%); }
        #crosshair::after { width: 20px; height: 2px; left: 50%; top: 50%; transform: translate(-50%, -50%); }

        #hotbar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 4px; z-index: 100;
            padding: 8px; background: rgba(0, 0, 0, 0.5);
            border-radius: 4px; border: 2px solid #333;
        }
        .hotbar-slot {
            width: 50px; height: 50px;
            background: rgba(80, 80, 80, 0.8);
            border: 2px solid #444;
            display: flex; align-items: center; justify-content: center;
            position: relative; cursor: pointer;
        }
        .hotbar-slot.selected {
            border-color: #fff; box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        .hotbar-slot .block-preview {
            width: 36px; height: 36px;
        }
        .hotbar-slot .slot-number {
            position: absolute; top: 2px; left: 4px;
            font-size: 10px; color: #aaa;
        }

        #instructions {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 200; color: #fff; text-align: center;
        }
        #instructions h1 {
            font-size: 48px; margin-bottom: 20px;
            color: #4a9c2d; text-shadow: 4px 4px 0 #2d5c1a;
        }
        #instructions .controls {
            background: rgba(50, 50, 50, 0.8);
            padding: 20px 40px; border-radius: 8px; margin: 20px 0;
        }
        #instructions .controls p { font-size: 12px; margin: 8px 0; color: #ccc; }
        #instructions .controls span {
            color: #fff; background: #333;
            padding: 2px 8px; border-radius: 3px; margin-right: 10px;
        }
        #instructions .start-prompt {
            font-size: 24px; margin-top: 30px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes flash { 0% { opacity: 0.3; } 100% { opacity: 0; } }

        #debug {
            position: fixed; top: 10px; left: 10px;
            background: rgba(0, 0, 0, 0.7); padding: 10px 15px;
            color: #0f0; font-size: 12px; font-family: monospace;
            z-index: 100; display: none; line-height: 1.6;
        }
        #debug.visible { display: block; }

        #inventory {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(30, 30, 30, 0.95);
            border: 3px solid #555; border-radius: 8px;
            padding: 20px; z-index: 150; display: none;
        }
        #inventory.visible { display: block; }
        #inventory h2 { color: #fff; margin-bottom: 20px; text-align: center; }
        #inventory .inventory-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
        }
        .inventory-slot {
            width: 60px; height: 60px;
            background: rgba(80, 80, 80, 0.8);
            border: 2px solid #444;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .inventory-slot:hover { border-color: #888; }
        .inventory-slot .block-preview { width: 44px; height: 44px; }
        
        #health-bar {
            position: fixed; top: 20px; right: 20px;
            display: flex; gap: 4px; z-index: 100;
            padding: 8px; background: rgba(0, 0, 0, 0.5);
            border-radius: 4px; border: 2px solid #333;
        }
        .health-heart {
            width: 16px; height: 16px;
            background: #e74c3c;
            clip-path: path('M8 1.5c-1.8-2.2-4.7-2.2-6.5 0-1.8 2.2-1.8 5.7 0 7.9l6.5 7.9 6.5-7.9c1.8-2.2 1.8-5.7 0-7.9-1.8-2.2-4.7-2.2-6.5 0z');
        }
        .health-heart.empty { background: #444; }
        
        #food-bar {
            position: fixed; top: 50px; right: 20px;
            display: flex; gap: 4px; z-index: 100;
            padding: 8px; background: rgba(0, 0, 0, 0.5);
            border-radius: 4px; border: 2px solid #333;
        }
        .food-drum {
            width: 14px; height: 14px;
            background: #f39c12;
            border-radius: 50%;
        }
        .food-drum.empty { background: #444; }
        
        #crafting-ui, #furnace-ui {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(30, 30, 30, 0.95);
            border: 3px solid #555; border-radius: 8px;
            padding: 20px; z-index: 160; display: none;
        }
        #crafting-ui.visible, #furnace-ui.visible { display: block; }
        #crafting-ui h2, #furnace-ui h2 { color: #fff; margin-bottom: 20px; text-align: center; }
        
        .crafting-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px;
            margin-bottom: 20px;
        }
        .craft-slot {
            width: 50px; height: 50px;
            background: rgba(80, 80, 80, 0.8);
            border: 2px solid #444;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative;
        }
        .craft-slot:hover { border-color: #888; }
        
        .craft-result {
            display: flex; justify-content: center; margin: 20px 0;
        }
        .result-slot {
            width: 60px; height: 60px;
            background: rgba(100, 100, 100, 0.8);
            border: 2px solid #ffd700;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        
        .furnace-slots {
            display: flex; gap: 20px; justify-content: center;
            margin: 20px 0;
        }
        .furnace-slot {
            width: 50px; height: 50px;
            background: rgba(80, 80, 80, 0.8);
            border: 2px solid #444;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            position: relative;
        }
        .furnace-slot:hover { border-color: #888; }
        
        .furnace-fire {
            width: 40px; height: 40px;
            position: relative;
        }
        
        .fire-icon {
            width: 100%; height: 100%;
            background: linear-gradient(to bottom, #ff6600, #ff3300);
            clip-path: polygon(20% 0%, 80% 0%, 100% 50%, 80% 100%, 20% 100%, 0% 50%);
            animation: flicker 0.3s infinite alternate;
        }
        @keyframes flicker {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.1); opacity: 0.8; }
        }
        
        .furnace-progress {
            width: 100px; height: 8px;
            background: rgba(50, 50, 50, 0.8);
            border: 1px solid #444;
            margin: 10px auto;
        }
        .furnace-progress-fill {
            height: 100%;
            background: #4a9c2d;
            width: 0%;
            transition: width 0.1s;
        }
        
        .crafting-close, .furnace-close {
            position: absolute; top: 10px; right: 10px;
            color: #fff; cursor: pointer;
            font-size: 20px;
        }
        
        .slot-count {
            position: absolute; bottom: 2px; right: 4px;
            font-size: 11px; color: #fff;
            text-shadow: 1px 1px 1px #000;
        }
        .slot-durability {
            position: absolute; bottom: 2px; left: 4px;
            font-size: 9px; color: #aaa;
        }
        
        .item-count-input {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 40px; text-align: center;
            background: rgba(0,0,0,0.8); color: #fff;
            border: 1px solid #555; padding: 2px;
            font-family: 'Silkscreen', monospace;
            font-size: 12px;
        }
    </style>
</head>

        function updateMobs(dt) {
            const nowNight = timeOfDay > 0.4 && timeOfDay < 0.8;
            
            if (nowNight && !isNight && Math.random() < 0.02) {
                for (let i = 0; i < 3; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 10 + Math.random() * 20;
                    const x = player.position.x + Math.cos(angle) * dist;
                    const z = player.position.z + Math.sin(angle) * dist;
                    const y = getBlock(Math.floor(x), GROUND_HEIGHT + 1, Math.floor(z));
                    if (y === BLOCKS.GRASS || y === BLOCKS.SNOW) {
                        spawnMob(HOSTILE_MOBS[Math.floor(Math.random() * HOSTILE_MOBS.length)], x, GROUND_HEIGHT + 2, z);
                    }
                }
            }
            isNight = nowNight;
            
            if (!nowNight && Math.random() < 0.005 && mobs.filter(m => !m.type.passive).length < 5) {
                mobs.filter(m => !m.type.passive).forEach(m => {
                    m.health = 0;
                });
            }
            
            for (let i = mobs.length - 1; i >= 0; i--) {
                const mob = mobs[i];
                
                if (mob.health <= 0) {
                    mob.type.drops.forEach(drop => {
                        if (drop.type) addItemToInventory(drop.type, drop.count);
                    });
                    
                    if (mob.mesh) {
                        scene.remove(mob.mesh);
                        mobMeshes.delete(mob);
                    }
                    mobs.splice(i, 1);
                    continue;
                }
                
                const dist = mob.position.distanceTo(player.position);
                
                if (!mob.type.passive && dist < 20) {
                    mob.target = player.position.clone();
                    
                    if (mob.type.name === 'creeper' && dist < 2) {
                        damagePlayer(mob.type.damage || 5);
                        mob.health = 0;
                        spawnParticles(mob.position.x, mob.position.y, mob.position.z, { t: 0x00ff00 }, 20);
                        continue;
                    }
                } else if (!mob.target || dist > 25) {
                    mob.target = null;
                }
                
                if (mob.target) {
                    const direction = new THREE.Vector3().subVectors(mob.target, mob.position);
                    direction.y = 0;
                    direction.normalize();
                    
                    mob.velocity.x = direction.x * mob.type.speed;
                    mob.velocity.z = direction.z * mob.type.speed;
                    
                    if (mob.onGround && Math.random() < 0.01) {
                        mob.velocity.y = 4;
                        mob.onGround = false;
                    }
                } else {
                    mob.wanderTimer -= dt;
                    if (mob.wanderTimer <= 0) {
                        mob.wanderDirection = new THREE.Vector3(Math.random() - 0.5, 0, Math.random() - 0.5).normalize();
                        mob.wanderTimer = 2 + Math.random() * 3;
                    }
                    mob.velocity.x = mob.wanderDirection.x * (mob.type.speed * 0.3);
                    mob.velocity.z = mob.wanderDirection.z * (mob.type.speed * 0.3);
                }
                
                if (mob.attackCooldown > 0) mob.attackCooldown -= dt;
                
                const nextX = mob.position.x + mob.velocity.x * dt;
                const nextZ = mob.position.z + mob.velocity.z * dt;
                if (!checkMobCollision(nextX, mob.position.y, mob.position.z)) {
                    mob.position.x = nextX;
                }
                if (!checkMobCollision(mob.position.x, mob.position.y, nextZ)) {
                    mob.position.z = nextZ;
                }
                
                mob.velocity.y -= 15 * dt;
                const nextY = mob.position.y + mob.velocity.y * dt;
                if (getBlock(Math.floor(mob.position.x), Math.floor(nextY), Math.floor(mob.position.z)) === BLOCKS.AIR) {
                    mob.position.y = nextY;
                    mob.onGround = false;
                } else {
                    if (mob.velocity.y < 0) mob.onGround = true;
                    mob.velocity.y = 0;
                }
                
                if (mob.position.y < 2) {
                    mob.position.set(player.position.x + (Math.random() - 0.5) * 20, GROUND_HEIGHT + 2, player.position.z + (Math.random() - 0.5) * 20);
                }
                
                if (!mob.mesh) {
                    const geo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
                    const mat = new THREE.MeshLambertMaterial({ color: mob.type.color });
                    mob.mesh = new THREE.Mesh(geo, mat);
                    scene.add(mob.mesh);
                    mobMeshes.set(mob, mob.mesh);
                }
                mob.mesh.position.copy(mob.position);
            }
        }

        function checkMobCollision(x, y, z) {
            const hw = 0.4;
            const checkPoints = [
                [x - hw, y, z - hw], [x + hw, y, z - hw],
                [x - hw, y + 0.8, z - hw], [x + hw, y + 0.8, z - hw],
                [x - hw, y, z + hw], [x + hw, y, z + hw],
                [x - hw, y + 0.8, z + hw], [x + hw, y + 0.8, z + hw]
            ];
            return checkPoints.some(([px, py, pz]) => {
                const b = getBlock(Math.floor(px), Math.floor(py), Math.floor(pz));
                return b !== BLOCKS.AIR && b !== BLOCKS.WATER && b !== BLOCKS.LEAVES;
            });
        }

                const biomeData = getBiomeData(Math.floor(x), Math.floor(z));
                const biome = biomeData.type;
                
                // Different mobs in different biomes

        function checkCraftingRecipe() {
            const grid = [];
            for (let i = 0; i < 9; i++) {
                grid.push(craftingGrid[i] ? craftingGrid[i].type : null);
            }
            
            for (const recipe of CRAFTING_RECIPES) {
                const pattern = recipe.pattern;
                let matches = true;
                
                for (let row = 0; row < 3; row++) {
                    for (let col = 0; col < 3; col++) {
                        const expected = pattern[row] ? pattern[row][col] : null;
                        const actual = grid[row * 3 + col];
                        if (expected !== actual) {
                            matches = false;
                            break;
                        }
                    }
                    if (!matches) break;
                }
                
                if (matches) {
                    craftingResult = { type: recipe.result.type, count: recipe.result.count };
                    updateCraftingUI();
                    return;
                }
            }
            craftingResult = null;
            updateCraftingUI();
        }

        function craftItem() {
            if (!craftingResult) return;
            
            const canCraft = hasItem(craftingResult.type, 0);
            
            for (let i = 0; i < 9; i++) {

                    craftingGrid[i].count--;
                    if (craftingGrid[i].count <= 0) {
                        craftingGrid[i] = null;
                    }
                }
            }
            
            addItemToInventory(craftingResult.type, craftingResult.count);
            checkCraftingRecipe();
            updateInventoryUI();
        }

        const noise = new SimplexNoise(12345);
        let audioCtx;
        
        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        function playSound(type) {
            if (!audioCtx) initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'break') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.08);
            }
        }
        
        function SimplexNoise(seed) {
            this.p = new Uint8Array(512);
            for (let i = 0; i < 256; i++) this.p[i] = i;
            for (let i = 255; i > 0; i--) {
                seed = (seed * 16807) % 2147483647;
                const n = seed % (i + 1), q = this.p[i];
                this.p[i] = this.p[n]; this.p[n] = q;
            }
            for (let i = 0; i < 512; i++) this.p[i] = this.p[i & 255];
        }
        
        SimplexNoise.prototype.noise2D = function(x, y) {
            const F2 = 0.5 * (Math.sqrt(3) - 1), G2 = (3 - Math.sqrt(3)) / 6;
            const s = (x + y) * F2, i = Math.floor(x + s), j = Math.floor(y + s);
            const t = (i + j) * G2, x0 = x - (i - t), y0 = y - (j - t);
            const i1 = x0 > y0 ? 1 : 0, j1 = x0 > y0 ? 0 : 1;
            const x1 = x0 - i1 + G2, y1 = y0 - j1 + G2, x2 = x0 - 1 + 2 * G2, y2 = y0 - 1 + 2 * G2;
            const ii = i & 255, jj = j & 255;
            const grad = (h, x, y) => { const u = h < 4 ? x : y, v = h < 4 ? y : x; return ((h & 1) ? -u : u) + ((h & 2) ? -2 * v : 2 * v); };
            let n0 = 0, n1 = 0, n2 = 0;
            let t0 = 0.5 - x0*x0 - y0*y0;
            if (t0 >= 0) { t0 *= t0; n0 = t0 * t0 * grad(this.p[ii + this.p[jj]], x0, y0); }
            let t1 = 0.5 - x1*x1 - y1*y1;
            if (t1 >= 0) { t1 *= t1; n1 = t1 * t1 * grad(this.p[ii + i1 + this.p[jj + j1]], x1, y1); }
            let t2 = 0.5 - x2*x2 - y2*y2;
            if (t2 >= 0) { t2 *= t2; n2 = t2 * t2 * grad(this.p[ii + 1 + this.p[jj + 1]], x2, y2); }
            return 70 * (n0 + n1 + n2);
        };

        const _chunkSize = 16, _chunkHeight = 128;

        const GROUND_HEIGHT = 8;

        // Multi-octave noise for terrain
        function fbm(x, z, octaves, persistence, scale) {
            let value = 0;
            let amplitude = 1;
            let frequency = scale;
            let maxValue = 0;
            
            for (let i = 0; i < octaves; i++) {
                value += amplitude * noise.noise2D(x * frequency, z * frequency);
                maxValue += amplitude;
                amplitude *= persistence;
                frequency *= 2;
            }
            
            return value / maxValue;
        }

        function getHeight(x, z) {
            // Base terrain with multiple octaves
            const baseHeight = fbm(x * 0.01, z * 0.01, 6, 0.5, 1) * 20;
            
            // Add detail
            const detail = fbm(x * 0.05, z * 0.05, 3, 0.5, 1) * 3;
            
            // Large scale variation (hills/valleys)
            const largeScale = fbm(x * 0.003, z * 0.003, 2, 0.5, 1) * 15;
            
            let h = Math.floor(GROUND_HEIGHT + baseHeight + detail + largeScale);
            
            // Biome-based height modifiers
            const biomeData = getBiomeData(x, z);
            if (biomeData.type === 'mountains') h += 15;
            else if (biomeData.type === 'hills') h += 8;
            else if (biomeData.type === 'desert') h -= 2;
            
            // Clamp to valid range
            return Math.max(1, Math.min(_chunkHeight - 10, h));
        }

        function getBiomeData(x, z) {
            // Temperature and moisture determine biome
            const temp = fbm(x * 0.008, z * 0.008, 2, 0.5, 1);
            const moisture = fbm(x * 0.008 + 1000, z * 0.008 + 1000, 2, 0.5, 1);
            
            // Calculate height independently to avoid recursion
            const baseHeight = fbm(x * 0.01, z * 0.01, 6, 0.5, 1) * 20;
            const detail = fbm(x * 0.05, z * 0.05, 3, 0.5, 1) * 3;
            const largeScale = fbm(x * 0.003, z * 0.003, 2, 0.5, 1) * 15;
            const height = Math.floor(GROUND_HEIGHT + baseHeight + detail + largeScale);
            
            // High elevation = mountains/snow
            if (height > GROUND_HEIGHT + 20) {
                return { type: 'mountains', tree: false };
            }
            if (height > GROUND_HEIGHT + 12) {
                return { type: 'hills', tree: false };
            }
            
            // Low moisture = desert
            if (moisture < -0.3) {
                return { type: 'desert', tree: false };
            }
            // High moisture + cold = taiga
            if (moisture > 0.3 && temp < 0.1) {
                return { type: 'taiga', tree: 'pine' };
            }
            // Very high temp + low moisture = savanna
            if (temp > 0.5 && moisture < 0) {
                return { type: 'savanna', tree: false };
            }
            // Medium moisture = forest
            if (moisture > 0.1 && temp > -0.2 && temp < 0.4) {
                return { type: 'forest', tree: true };
            }
            // Default = plains
            return { type: 'plains', tree: Math.random() > 0.7 };
        }



        function getSurfaceBlock(biome, y, height) {
            // Snow on mountains
            if (biome === 'mountains' && y >= height - 2) {
                return BLOCKS.SNOW;
            }
            // Sand in desert
            if (biome === 'desert') {
                return BLOCKS.SAND;
            }
            // Snow in taiga
            if (biome === 'taiga' && y >= height - 1) {
                return BLOCKS.SNOW;
            }
            return BLOCKS.GRASS;
        }

        function getUndergroundBlock(y, height, biome) {
            // Stone below
            if (y <= 5) return BLOCKS.STONE;
            
            // Dirt layer
            const dirtDepth = biome === 'desert' ? 2 : 3;
            if (y < height - dirtDepth) {
                return BLOCKS.DIRT;
            }
            
            // Surface
            return getSurfaceBlock(biome, y, height);
        }

        function getBlock(x, y, z) {
            if (y < 0 || y >= _chunkHeight) return BLOCKS.AIR;
            const cx = (x >> 4) << 4, cz = (z >> 4) << 4;
            const chunk = chunks.get(`${cx},${cz}`);
            if (!chunk) return BLOCKS.AIR;
            const lx = x - cx, lz = z - cz;
            return chunk.blocks[lx + lz * _chunkSize + y * _chunkSize * _chunkSize] || BLOCKS.AIR;
        }

        function setBlock(x, y, z, type) {
            if (y < 0 || y >= _chunkHeight) return;
            const cx = (x >> 4) << 4, cz = (z >> 4) << 4;
            const chunk = chunks.get(`${cx},${cz}`);
            if (!chunk) return;
            const lx = x - cx, lz = z - cz;
            const idx = lx + lz * _chunkSize + y * _chunkSize * _chunkSize;
            const oldType = chunk.blocks[idx];
            if (oldType === type) return;
            chunk.blocks[idx] = type;
            chunk.dirty = true;
        }

        // Ore generation function
        function getOre(x, y, z) {
            // Coal - common, from y=0 to y=60
            if (noise.noise2D(x * 0.1, y * 0.1 + z * 0.1) > 0.7 && y < 60) {
                return BLOCKS.COAL_ORE;
            }
            // Iron - less common, y=0 to y=40
            if (noise.noise2D(x * 0.12 + 100, y * 0.12 + z * 0.12) > 0.75 && y < 40) {
                return BLOCKS.IRON_ORE;
            }
            // Gold - rare, y=0 to y=20
            if (noise.noise2D(x * 0.14 + 200, y * 0.14 + z * 0.14) > 0.82 && y < 20) {
                return BLOCKS.GOLD_ORE;
            }
            // Diamond - very rare, y=0 to y=12
            if (noise.noise2D(x * 0.16 + 300, y * 0.16 + z * 0.16) > 0.88 && y < 12) {
                return BLOCKS.DIAMOND_ORE;
            }
            return BLOCKS.STONE;
        }

        // Cave generation
        function isCave(x, y, z) {
            if (y < 5 || y > 50) return false;
            const caveNoise = fbm(x * 0.03, z * 0.03, 3, 0.5, 1);
            const tunnelNoise = Math.abs(noise.noise2D(x * 0.05 + y * 0.02, z * 0.05));
            return caveNoise > 0.3 && tunnelNoise > 0.6;
        }

        // Tree generation
        function generateTree(chunk, x, z, h, biomeData, positions) {
            const treeType = biomeData.tree;
            if (!treeType) return;
            
            const lx = x, lz = z;
            let trunkHeight, leafRadius;
            
            if (treeType === 'pine') {
                // Pine tree (taiga)
                trunkHeight = 6 + Math.floor(Math.random() * 3);
                // Spruce wood
                for (let ty = 1; ty <= trunkHeight; ty++) {
                    if (h + ty < _chunkHeight) {
                        const idx = lx + lz * _chunkSize + (h + ty) * _chunkSize * _chunkSize;
                        chunk.blocks[idx] = BLOCKS.WOOD;
                        positions.push({ x: lx + 0.5, y: h + ty + 0.5, z: lz + 0.5, type: BLOCKS.WOOD });
                    }
                }
                // Triangle leaves
                for (let ly = 0; ly < 4; ly++) {
                    const radius = ly < 3 ? 1 : 0;
                    for (let lx2 = -radius; lx2 <= radius; lx2++) {
                        for (let lz2 = -radius; lz2 <= radius; lz2++) {
                            if (Math.abs(lx2) + Math.abs(lz2) > radius + 1) continue;
                            const leafY = h + trunkHeight - 1 + ly;
                            const lx3 = lx + lx2, lz3 = lz + lz2;
                            if (lx3 >= 0 && lx3 < _chunkSize && lz3 >= 0 && lz3 < _chunkSize && leafY < _chunkHeight) {
                                const idx = lx3 + lz3 * _chunkSize + leafY * _chunkSize * _chunkSize;
                                if (!chunk.blocks[idx]) {
                                    chunk.blocks[idx] = BLOCKS.LEAVES;
                                    positions.push({ x: lx3 + 0.5, y: leafY + 0.5, z: lz3 + 0.5, type: BLOCKS.LEAVES });
                                }
                            }
                        }
                    }
                }
            } else {
                // Different tree styles based on biome
                if (biomeData.type === 'savanna') {
                    // Acacia style - short trunk, flat top
                    trunkHeight = 3;
                    for (let ty = 1; ty <= trunkHeight; ty++) {
                        if (h + ty < _chunkHeight) {
                            const idx = lx + lz * _chunkSize + (h + ty) * _chunkSize * _chunkSize;
                            chunk.blocks[idx] = BLOCKS.WOOD;
                            positions.push({ x: lx + 0.5, y: h + ty + 0.5, z: lz + 0.5, type: BLOCKS.WOOD });
                        }
                    }
                    // Flat leaf canopy
                    for (let ly = 0; ly < 2; ly++) {
                        for (let lx2 = -2; lx2 <= 2; lx2++) {
                            for (let lz2 = -2; lz2 <= 2; lz2++) {
                                const leafY = h + trunkHeight + ly;
                                const lx3 = lx + lx2, lz3 = lz + lz2;
                                if (lx3 >= 0 && lx3 < _chunkSize && lz3 >= 0 && lz3 < _chunkSize && leafY < _chunkHeight) {
                                    const idx = lx3 + lz3 * _chunkSize + leafY * _chunkSize * _chunkSize;
                                    if (!chunk.blocks[idx]) {
                                        chunk.blocks[idx] = BLOCKS.LEAVES;
                                        positions.push({ x: lx3 + 0.5, y: leafY + 0.5, z: lz3 + 0.5, type: BLOCKS.LEAVES });
                                    }
                                }
                            }
                        }
                    }
                    return;
                }
                
                // Regular oak tree
                trunkHeight = 3 + Math.floor(Math.random() * 2);
                for (let ty = 1; ty <= trunkHeight; ty++) {
                    if (h + ty < _chunkHeight) {
                        const idx = lx + lz * _chunkSize + (h + ty) * _chunkSize * _chunkSize;
                        chunk.blocks[idx] = BLOCKS.WOOD;
                        positions.push({ x: lx + 0.5, y: h + ty + 0.5, z: lz + 0.5, type: BLOCKS.WOOD });
                    }
                }
                // Leaves
                for (let ly = -1; ly <= 2; ly++) {
                    for (let lx2 = -2; lx2 <= 2; lx2++) {
                        for (let lz2 = -2; lz2 <= 2; lz2++) {
                            if (Math.abs(lx2) === 2 && Math.abs(lz2) === 2) continue;
                            if (ly === 2 && (Math.abs(lx2) > 1 || Math.abs(lz2) > 1)) continue;
                            const leafY = h + trunkHeight + ly;
                            const lx3 = lx + lx2, lz3 = lz + lz2;
                            if (lx3 >= 0 && lx3 < _chunkSize && lz3 >= 0 && lz3 < _chunkSize && leafY < _chunkHeight) {
                                const idx = lx3 + lz3 * _chunkSize + leafY * _chunkSize * _chunkSize;
                                if (!chunk.blocks[idx]) {
                                    chunk.blocks[idx] = BLOCKS.LEAVES;
                                    positions.push({ x: lx3 + 0.5, y: leafY + 0.5, z: lz3 + 0.5, type: BLOCKS.LEAVES });
                                }
                            }
                        }
                    }
                }
            }
        }

        function generateChunk(cx, cz) {
            const key = `${cx},${cz}`;
            if (chunks.has(key)) return;
            
            const chunk = { blocks: new Uint8Array(_chunkSize * _chunkSize * _chunkHeight), meshes: [], dirty: true, cx, cz };
            const positions = [];
            
            for (let x = 0; x < _chunkSize; x++) {
                for (let z = 0; z < _chunkSize; z++) {
                    const wx = cx + x, wz = cz + z;
                    const h = getHeight(wx, wz);
                    const biomeData = getBiomeData(wx, wz);
                    const biome = biomeData.type;
                    
                    for (let y = 0; y < h; y++) {
                        let b;
                        
                        // Check for caves
                        if (isCave(wx, y, wz)) {
                            b = BLOCKS.AIR;
                        } else if (y === 0) {
                            b = BLOCKS.STONE;
                        } else if (y < h - 4) {
                            // Ore generation in stone layer
                            b = getOre(wx, y, wz);
                        } else {
                            b = getUndergroundBlock(y, h, biome);
                        }
                        
                        const idx = x + z * _chunkSize + y * _chunkSize * _chunkSize;
                        chunk.blocks[idx] = b;
                        if (b !== BLOCKS.AIR) positions.push({ x: x + 0.5, y: y + 0.5, z: z + 0.5, type: b });
                    }
                    
                    // Tree generation based on biome
                    if (biomeData.tree && noise.noise2D(wx * 0.5, wz * 0.5) > 0.6) {
                        generateTree(chunk, x, z, h, biomeData, positions);
                    }
                    
                    // Flowers and grass decoration
                    if (biome !== 'desert' && biome !== 'mountains' && h > GROUND_HEIGHT) {
                        const decorNoise = noise.noise2D(wx * 0.3 + 500, wz * 0.3 + 500);
                        if (decorNoise > 0.7) {
                            const flowerType = decorNoise > 0.85 ? BLOCKS.FLOWER_RED : (decorNoise > 0.8 ? BLOCKS.FLOWER_YELLOW : BLOCKS.GRASS_BLOCK);
                            const idx = x + z * _chunkSize + (h + 1) * _chunkSize * _chunkSize;
                            if (!chunk.blocks[idx]) {
                                chunk.blocks[idx] = flowerType;
                                positions.push({ x: x + 0.5, y: h + 1 + 0.5, z: z + 0.5, type: flowerType });
                            }
                        }
                    }
                    
                    // Water in low areas (desert oasis, rivers)
                    const waterLevel = GROUND_HEIGHT - 2;
                    if (h < waterLevel) {
                        for (let wy = h; wy <= waterLevel; wy++) {
                            const idx = x + z * _chunkSize + wy * _chunkSize * _chunkSize;
                            if (!chunk.blocks[idx]) {
                                chunk.blocks[idx] = BLOCKS.WATER;
                                positions.push({ x: x + 0.5, y: wy + 0.5, z: z + 0.5, type: BLOCKS.WATER });
                            }
                        }
                    }
                }
            }
            
            chunks.set(key, chunk);
            buildChunkMesh(chunk, positions);
        }

        function buildChunkMesh(chunk, positions) {
            chunk.meshes.forEach(m => scene.remove(m));
            chunk.meshes = [];
            if (!positions.length) return;
            
            const typeGroups = {};
            positions.forEach(p => {
                if (!typeGroups[p.type]) typeGroups[p.type] = [];
                typeGroups[p.type].push(p);
            });
            
            Object.keys(typeGroups).forEach(type => {
                const t = parseInt(type);
                const c = BLOCK_COLORS[t];
                const isTransObj = typeof c === 'object' && c.trans;
                const mat = new THREE.MeshLambertMaterial({
                    color: (typeof c === 'object' && c.t) ? c.t : (typeof c === 'number' ? c : 0x888888),
                    transparent: isTransObj, opacity: isTransObj ? 0.5 : 1
                });
                
                const mesh = new THREE.InstancedMesh(new THREE.BoxGeometry(1, 1, 1), mat, typeGroups[t].length);
                typeGroups[t].forEach((p, i) => {
                    _matrix.setPosition(p.x + chunk.cx, p.y, p.z + chunk.cz);
                    mesh.setMatrixAt(i, _matrix);
                });
                mesh.instanceMatrix.needsUpdate = true;
                scene.add(mesh);
                chunk.meshes.push(mesh);
            });
        }

        function updateChunkMesh(chunk) {
            if (!chunk.dirty) return;
            chunk.dirty = false;
            const positions = [];
            for (let x = 0; x < _chunkSize; x++) {
                for (let z = 0; z < _chunkSize; z++) {
                    for (let y = 0; y < _chunkHeight; y++) {
                        const b = chunk.blocks[x + z * _chunkSize + y * _chunkSize * _chunkSize];
                        if (b !== BLOCKS.AIR) positions.push({ x: x + 0.5, y: y + 0.5, z: z + 0.5, type: b });
                    }
                }
            }
            buildChunkMesh(chunk, positions);
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0xc8e0f0, 10, 80);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.copy(player.position);
            camera.position.y += player.height;

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(1);

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
            dirLight.position.set(30, 50, 30);
            scene.add(dirLight);

            for (let dx = -3; dx <= 3; dx++) {
                for (let dz = -3; dz <= 3; dz++) {
                    generateChunk(dx * 16, dz * 16);
                }
            }

            setupUI();
            setupControls();
            
            const hlGeo = new THREE.BoxGeometry(1.02, 1.02, 1.02);
            const hlMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.25 });
            highlightMesh = new THREE.Mesh(hlGeo, hlMat);
            highlightMesh.visible = false;
            scene.add(highlightMesh);

            particleGeometry = new THREE.BoxGeometry(0.1, 0.1, 0.1);
            particleMaterial = new THREE.MeshBasicMaterial({ transparent: true });

            animate();
        }

        const BLOCK_COLORS_PRECOMPUTED = {};
        Object.keys(BLOCK_COLORS).forEach(key => {
            const c = BLOCK_COLORS[key];
            if (!c) BLOCK_COLORS_PRECOMPUTED[key] = '#888';
            else if (c.trans) BLOCK_COLORS_PRECOMPUTED[key] = '#' + (c.t || 0xcccccc).toString(16).padStart(6, '0');
            else if (typeof c === 'object' && c.top) BLOCK_COLORS_PRECOMPUTED[key] = '#' + c.top.toString(16).padStart(6, '0');
            else if (c.t) BLOCK_COLORS_PRECOMPUTED[key] = '#' + c.t.toString(16).padStart(6, '0');
            else BLOCK_COLORS_PRECOMPUTED[key] = '#' + c.toString(16).padStart(6, '0');
        });

        function addItemToInventory(type, count = 1, durability = 0) {
            if (!type) return 0;
            
            for (let i = 0; i < inventory.length; i++) {
                if (inventory[i].type === type && inventory[i].count < 64) {
                    const space = 64 - inventory[i].count;
                    const add = Math.min(space, count);
                    inventory[i].count += add;
                    count -= add;
                    if (count <= 0) return 0;
                }
            }
            
            for (let i = 0; i < inventory.length; i++) {
                if (!inventory[i].type) {
                    inventory[i] = { type, count: Math.min(count, 64), durability };
                    count -= 64;
                    break;
                }
            }
            return Math.max(0, count);
        }

        function removeItemFromInventory(type, count = 1) {
            for (let i = 0; i < inventory.length; i++) {
                if (inventory[i].type === type) {
                    const take = Math.min(inventory[i].count, count);
                    inventory[i].count -= take;
                    count -= take;
                    if (inventory[i].count <= 0) inventory[i] = { type: null, count: 1, durability: 0 };
                    if (count <= 0) return true;
                }
            }
            return count <= 0;
        }

        function hasItem(type, count = 1) {
            let total = 0;
            for (let i = 0; i < inventory.length; i++) {
                if (inventory[i].type === type) total += inventory[i].count;
            }
            return total >= count;
        }

        function updateHealthUI() {
            const healthBar = document.getElementById('health-bar');
            healthBar.innerHTML = '';
            for (let i = 0; i < player.maxHealth; i += 2) {
                const heart = document.createElement('div');
                heart.className = 'health-heart' + (i >= player.health ? ' empty' : '');
                healthBar.appendChild(heart);
            }
        }

        function updateFoodUI() {
            const foodBar = document.getElementById('food-bar');
            foodBar.innerHTML = '';
            for (let i = 0; i < player.maxFood; i += 2) {
                const drum = document.createElement('div');
                drum.className = 'food-drum' + (i >= player.food ? ' empty' : '');
                foodBar.appendChild(drum);
            }
        }

        function damagePlayer(amount) {
            player.health = Math.max(0, player.health - amount);
            updateHealthUI();
            
            const flash = document.createElement('div');
            flash.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:red;opacity:0.3;pointer-events:none;z-index:200;animation:flash 0.2s forwards';
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 200);
            
            if (player.health <= 0) {
                respawnPlayer();
            }
        }

        function healPlayer(amount) {
            player.health = Math.min(player.maxHealth, player.health + amount);
            updateHealthUI();
        }

        function eatFood(foodAmount, saturationAmount) {
            if (player.food < player.maxFood) {
                player.food = Math.min(player.maxFood, player.food + foodAmount);
                player.saturation = Math.min(player.maxFood, player.saturation + saturationAmount);
                updateFoodUI();
            }
        }

        function respawnPlayer() {
            player.position.set(32, GROUND_HEIGHT + 4, 32);
            player.health = player.maxHealth;
            player.food = player.maxFood;
            player.velocity.set(0, 0, 0);
            updateHealthUI();
            updateFoodUI();
        }

        function setupUI() {
            const hotbar = document.getElementById('hotbar');
            hotbar.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const slot = document.createElement('div');
                slot.className = `hotbar-slot ${i === selectedBlock ? 'selected' : ''}`;
                slot.onclick = () => selectSlot(i);
                hotbar.appendChild(slot);
            }
            
            updateHotbarUI();
            updateInventoryUI();
            updateHealthUI();
            updateFoodUI();
            
            document.querySelector('.crafting-close').onclick = closeCrafting;
            document.querySelector('.furnace-close').onclick = closeFurnace;
        }

        function updateHotbarUI() {
            const slots = document.querySelectorAll('.hotbar-slot');
            slots.forEach((slot, i) => {
                slot.innerHTML = `<span class="slot-number">${i + 1}</span>`;
                const item = inventory[i];
                if (item && item.type) {
                    const preview = document.createElement('div');
                    preview.className = 'block-preview';
                    preview.style.background = BLOCK_COLORS_PRECOMPUTED[item.type] || '#888';
                    slot.appendChild(preview);
                    
                    if (item.count > 1) {
                        const count = document.createElement('span');
                        count.className = 'slot-count';
                        count.textContent = item.count;
                        slot.appendChild(count);
                    }
                    
                    const toolInfo = TOOL_TYPES[item.type];
                    if (toolInfo && item.durability > 0) {
                        const dur = document.createElement('span');
                        dur.className = 'slot-durability';
                        dur.textContent = item.durability;
                        slot.appendChild(dur);
                    }
                }
            });
        }

        function updateInventoryUI() {
            const invGrid = document.querySelector('.inventory-grid');
            invGrid.innerHTML = '';
            
            for (let i = 0; i < inventory.length; i++) {
                const slot = document.createElement('div');
                slot.className = 'inventory-slot' + (i === selectedInventorySlot ? ' selected' : '');
                slot.onclick = () => { selectedInventorySlot = i; updateInventoryUI(); };
                
                const item = inventory[i];
                if (item && item.type) {
                    const preview = document.createElement('div');
                    preview.className = 'block-preview';
                    preview.style.background = BLOCK_COLORS_PRECOMPUTED[item.type] || '#888';
                    slot.appendChild(preview);
                    
                    if (item.count > 1) {
                        const count = document.createElement('span');
                        count.className = 'slot-count';
                        count.textContent = item.count;
                        slot.appendChild(count);
                    }
                    
                    const toolInfo = TOOL_TYPES[item.type];
                    if (toolInfo && item.durability > 0) {
                        const dur = document.createElement('span');
                        dur.className = 'slot-durability';
                        dur.textContent = item.durability;
                        slot.appendChild(dur);
                    }
                }
                invGrid.appendChild(slot);
            }
        }

        function selectSlot(i) {
            if (i >= 0 && i < HOTBAR_BLOCKS.length) {
                selectedBlock = i;
                document.querySelectorAll('.hotbar-slot').forEach((s, idx) => s.classList.toggle('selected', idx === i));
            }
        }

        function toggleInventory() {
            if (craftingOpen) { closeCrafting(); return; }
            if (furnaceOpen) { closeFurnace(); return; }
            
            showInventory = !showInventory;
            document.getElementById('inventory').classList.toggle('visible', showInventory);
            if (showInventory) document.exitPointerLock();
            else if (gameStarted) document.body.requestPointerLock();
        }

        function setupControls() {
            document.addEventListener('keydown', e => {
                if (!keys[e.code]) keysJustDown[e.code] = true;
                keys[e.code] = true;
                if (e.code >= 'Digit1' && e.code <= 'Digit9') selectSlot(parseInt(e.code[5]) - 1);
                if (e.code === 'F3') { e.preventDefault(); showDebug = !showDebug; document.getElementById('debug').classList.toggle('visible', showDebug); }
                if (e.code === 'KeyE') toggleInventory();
                if (e.code === 'KeyC') { 
                    if (!craftingOpen && !furnaceOpen) {
                        openCrafting();
                    }
                }
                if (e.code === 'Escape') {
                    if (showInventory) toggleInventory();
                    else if (craftingOpen) closeCrafting();
                    else if (furnaceOpen) closeFurnace();
                }
            });
            document.addEventListener('keyup', e => keys[e.code] = false);

            document.addEventListener('mousemove', e => {
                if (!isLocked || showInventory || craftingOpen || furnaceOpen) return;
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-1.5, Math.min(1.5, pitch));
            });

            document.addEventListener('click', () => {
                if (!gameStarted) { startGame(); return; }
                if (!isLocked && !showInventory && !craftingOpen && !furnaceOpen) document.body.requestPointerLock();
            });

            document.addEventListener('pointerlockchange', () => { isLocked = document.pointerLockElement === document.body; });

            document.addEventListener('mousedown', e => {
                if (!isLocked) return;
                if (showInventory || craftingOpen || furnaceOpen) return;
                
                if (e.button === 0) {
                    const selectedItem = inventory[selectedInventorySlot];
                    if (selectedItem && selectedItem.type === BLOCKS.CRAFTING_TABLE) {
                        openCrafting();
                        return;
                    }
                    if (selectedItem && selectedItem.type === BLOCKS.FURNACE) {
                        openFurnace();
                        return;
                    }
                    breakBlock();
                }
                else if (e.button === 2) placeBlock();
            });

            document.addEventListener('contextmenu', e => e.preventDefault());
            window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        }

        function startGame() {
            gameStarted = true;
            document.getElementById('instructions').style.display = 'none';
            document.body.requestPointerLock();
        }

        function raycast() {
            _origin.copy(camera.position);
            _dir.set(0, 0, -1).applyQuaternion(camera.quaternion);
            
            for (let d = 0; d < reachDistance; d += 0.15) {
                _v0.copy(_origin).addScaledVector(_dir, d);
                const bx = Math.floor(_v0.x), by = Math.floor(_v0.y), bz = Math.floor(_v0.z);
                const b = getBlock(bx, by, bz);
                if (b !== BLOCKS.AIR && b !== BLOCKS.WATER && b !== BLOCKS.LEAVES) {
                    return { x: bx, y: by, z: bz, block: b };
                }
            }
            return null;
        }

        function breakBlock() {
            const hit = raycast();
            if (hit && hit.block !== BLOCKS.STONE) {
                spawnParticles(hit.x + 0.5, hit.y + 0.5, hit.z + 0.5, BLOCK_COLORS[hit.block], 8);
                playSound('break');
                
                let dropType = hit.block;
                if (hit.block === BLOCKS.COBBLE) dropType = BLOCKS.COBBLESTONE;
                else if (hit.block === BLOCKS.GRASS) dropType = BLOCKS.DIRT;
                
                addItemToInventory(dropType, 1);
                setBlock(hit.x, hit.y, hit.z, BLOCKS.AIR);
                updateHotbarUI();
                updateInventoryUI();
                
                const selectedItem = inventory[selectedInventorySlot];
                if (selectedItem && TOOL_TYPES[selectedItem.type]) {
                    selectedItem.durability--;
                    if (selectedItem.durability <= 0) {
                        selectedItem.type = null;
                        selectedItem.count = 1;
                        selectedItem.durability = 0;
                    }
                    updateHotbarUI();
                    updateInventoryUI();
                }
            }
        }

        function spawnParticles(x, y, z, color, count) {
            const c = color && color.t ? color.t : (color || 0x888888);
            for (let i = 0; i < count; i++) {
                const mat = particleMaterial.clone();
                mat.color.setHex(c);
                const mesh = new THREE.Mesh(particleGeometry, mat);
                mesh.position.set(x, y, z);
                mesh.userData = {
                    velocity: new THREE.Vector3(
                        (Math.random() - 0.5) * 3,
                        Math.random() * 3 + 1,
                        (Math.random() - 0.5) * 3
                    ),
                    life: 1.0
                };
                scene.add(mesh);
                particles.push(mesh);
            }
        }

        function updateParticles(dt) {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.userData.velocity.y -= 10 * dt;
                p.position.addScaledVector(p.userData.velocity, dt);
                p.userData.life -= dt * 2;
                p.material.opacity = p.userData.life;
                p.rotation.x += dt * 5;
                p.rotation.y += dt * 5;
                
                if (p.userData.life <= 0) {
                    scene.remove(p);
                    p.material.dispose();
                    particles.splice(i, 1);
                }
            }
        }

        function placeBlock() {
            const hit = raycast();
            if (!hit) return;
            
            const selectedItem = inventory[selectedInventorySlot];
            if (!selectedItem || !selectedItem.type) return;
            
            const placeType = selectedItem.type;
            if (placeType === BLOCKS.WATER) return;
            
            _dir.set(0, 0, -1).applyQuaternion(camera.quaternion);
            let nx = 0, ny = 0, nz = 0;
            const ax = Math.abs(_dir.x), ay = Math.abs(_dir.y), az = Math.abs(_dir.z);
            if (ax > ay && ax > az) nx = Math.sign(_dir.x);
            else if (ay > az) ny = Math.sign(_dir.y);
            else nz = Math.sign(_dir.z);
            
            const nx2 = hit.x + nx, ny2 = hit.y + ny, nz2 = hit.z + nz;
            
            const px = player.position.x, py = player.position.y, pz = player.position.z;
            if (nx2 < px + 0.3 && nx2 + 1 > px - 0.3 && ny2 < py + player.height + 0.3 && ny2 + 1 > py - 0.3 && nz2 < pz + 0.3 && nz2 + 1 > pz - 0.3) return;
            
            spawnParticles(nx2 + 0.5, ny2 + 0.5, nz2 + 0.5, BLOCK_COLORS[placeType], 4);
            playSound('place');
            setBlock(nx2, ny2, nz2, placeType);
            
            selectedItem.count--;
            if (selectedItem.count <= 0) selectedItem.type = null;
            
            updateHotbarUI();
            updateInventoryUI();
        }

        function updateChunks() {
            const px = Math.floor(player.position.x / 16);
            const pz = Math.floor(player.position.z / 16);
            
            for (let dx = -3; dx <= 3; dx++) {
                for (let dz = -3; dz <= 3; dz++) {
                    generateChunk((px + dx) * 16, (pz + dz) * 16);
                }
            }
            
            chunks.forEach((chunk, key) => {
                const cx = chunk.cx + 8, cz = chunk.cz + 8;
                const dist = Math.sqrt((cx - player.position.x) ** 2 + (cz - player.position.z) ** 2);
                
                chunk.meshes.forEach(mesh => {
                    mesh.visible = dist < 60;
                });
            });
        }

        function checkCollision(pos) {
            const hw = player.width / 2;
            const checkPoints = [
                [pos.x - hw, pos.y, pos.z - hw], [pos.x + hw, pos.y, pos.z - hw],
                [pos.x - hw, pos.y, pos.z + hw], [pos.x + hw, pos.y, pos.z + hw],
                [pos.x - hw, pos.y + player.height, pos.z - hw], [pos.x + hw, pos.y + player.height, pos.z - hw],
                [pos.x - hw, pos.y + player.height, pos.z + hw], [pos.x + hw, pos.y + player.height, pos.z + hw]
            ];
            return checkPoints.some(([x, y, z]) => getBlock(Math.floor(x), Math.floor(y), Math.floor(z)) !== BLOCKS.AIR);
        }

        function updatePlayer(dt) {
            if (!isLocked || showInventory) return;
            
            const forward = _v0.set(0, 0, -1).applyAxisAngle(_up, yaw);
            const right = _v2.set(1, 0, 0).applyAxisAngle(_up, yaw);
            
            _v3.set(0, 0, 0);
            if (keys['ArrowUp']) _v3.add(forward);
            if (keys['ArrowDown']) _v3.sub(forward);
            if (keys['ArrowLeft']) _v3.sub(right);
            if (keys['ArrowRight']) _v3.add(right);
            
            if (_v3.length() > 0) _v3.normalize().multiplyScalar(moveSpeed * dt);
            
            _v1.copy(player.position); _v1.x += _v3.x;
            if (!checkCollision(_v1)) player.position.x = _v1.x;
            
            _v1.copy(player.position); _v1.z += _v3.z;
            if (!checkCollision(_v1)) player.position.z = _v1.z;

            if (keysJustDown['Space'] && player.onGround) { player.velocity.y = jumpForce; player.onGround = false; }
            keysJustDown['Space'] = false;
            
            player.velocity.y -= gravity * dt;
            _v1.copy(player.position); _v1.y += player.velocity.y * dt;
            
            if (!checkCollision(_v1)) {
                player.position.y = _v1.y;
                player.onGround = false;
            } else {
                if (player.velocity.y < 0) player.onGround = true;
                player.velocity.y = 0;
            }

            // Respawn if fallen too far or stuck
            if (player.position.y < 2) {
                const spawnHeight = getHeight(Math.floor(player.position.x), Math.floor(player.position.z));
                player.position.set(player.position.x, spawnHeight + 10, player.position.z);
                player.velocity.y = 0;
            }
            // Spawn at world start
            if (player.position.x === 32 && player.position.y > 100) {
                const spawnHeight = getHeight(32, 32);
                player.position.set(32, spawnHeight + 5, 32);
            }

            const targetCamY = player.position.y + player.height - 0.2;
            camera.position.x += (player.position.x - camera.position.x) * 0.15;
            camera.position.y += (targetCamY - camera.position.y) * 0.15;
            camera.position.z += (player.position.z - camera.position.z) * 0.15;
            camera.rotation.order = 'YXZ';
            camera.rotation.y = yaw;
            camera.rotation.x = pitch;
        }

        function updateTime(dt) {
            timeOfDay = (timeOfDay + dt / 600) % 1;
            const t = Math.sin(timeOfDay * Math.PI * 2);
            const skyColor = new THREE.Color();
            
            // More detailed day/night cycle
            if (timeOfDay < 0.2) {
                // Dawn
                skyColor.lerpColors(new THREE.Color(0x1a1a2e), new THREE.Color(0xff9966), timeOfDay * 5);
            } else if (timeOfDay < 0.3) {
                // Morning to day
                skyColor.lerpColors(new THREE.Color(0xff9966), new THREE.Color(0x87CEEB), (timeOfDay - 0.2) * 10);
            } else if (timeOfDay < 0.7) {
                // Day
                skyColor.setHex(0x87CEEB);
            } else if (timeOfDay < 0.8) {
                // Afternoon to dusk
                skyColor.lerpColors(new THREE.Color(0x87CEEB), new THREE.Color(0xff6633), (timeOfDay - 0.7) * 10);
            } else if (timeOfDay < 0.9) {
                // Dusk to night
                skyColor.lerpColors(new THREE.Color(0xff6633), new THREE.Color(0x0a0a1a), (timeOfDay - 0.8) * 10);
            } else {
                // Night
                skyColor.setHex(0x0a0a1a);
            }
            
            scene.background = skyColor;
            scene.fog.color = skyColor;
            
            isNight = timeOfDay > 0.4 && timeOfDay < 0.8;
            
            const dirLight = scene.children.find(c => c.isDirectionalLight);
            if (dirLight) {
                let brightness;
                if (timeOfDay < 0.25 || timeOfDay > 0.85) {
                    brightness = 0.2;
                } else if (timeOfDay < 0.35 || timeOfDay > 0.75) {
                    brightness = 0.5;
                } else {
                    brightness = 0.8;
                }
                dirLight.intensity = brightness;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const now = performance.now();
            const delta = Math.min((now - lastTime) / 1000, 0.05);
            lastTime = now;

            frameCount++;
            if (frameCount % 30 === 0) {
                fps = Math.round(1 / delta);
                document.getElementById('debug-fps').textContent = `FPS: ${fps}`;
                document.getElementById('debug-pos').textContent = `Pos: ${player.position.x.toFixed(1)}, ${player.position.y.toFixed(1)}, ${player.position.z.toFixed(1)}`;
            }

            updatePlayer(delta);
            updateChunks();
            updateParticles(delta);
            updateTime(delta);
            updateMobs(delta);
            
            if (furnaceOpen || furnaceBurnTime > 0 || furnaceInput) {
                updateFurnace(delta);
            }

            chunks.forEach(chunk => { if (chunk.dirty) updateChunkMesh(chunk); });

            const hit = raycast();
            if (hit && highlightMesh && !showInventory && !craftingOpen && !furnaceOpen) {
                highlightMesh.position.set(hit.x + 0.5, hit.y + 0.5, hit.z + 0.5);
                highlightMesh.visible = true;
            } else if (highlightMesh) {
                highlightMesh.visible = false;
            }

            renderer.render(scene, camera);
        }

        init();
        
        setTimeout(() => {
            spawnPassiveMobs();
        }, 2000);
    </script>
</body>
