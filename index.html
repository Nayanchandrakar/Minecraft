<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxelCraft</title>
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="game-canvas"></canvas>
    <div id="crosshair"></div>
    <div id="hotbar"></div>
    <div id="debug">
        <div>VoxelCraft</div>
        <div id="debug-fps">FPS: 0</div>
        <div id="debug-pos">Position: 0, 0, 0</div>
    </div>
    <div id="instructions">
        <h1>VOXELCRAFT</h1>
        <div class="controls">
            <p><span>ARROW KEYS</span> Move</p>
            <p><span>SPACE</span> Jump</p>
            <p><span>MOUSE</span> Look around</p>
            <p><span>LEFT CLICK</span> Break/Use block</p>
            <p><span>RIGHT CLICK</span> Place block</p>
            <p><span>1-9</span> Select hotbar slot</p>
            <p><span>E</span> Inventory</p>
            <p><span>C</span> Crafting Table</p>
            <p><span>F3</span> Debug info</p>
            <p><span>ESC</span> Close UI</p>
        </div>
        <div class="start-prompt">Click to Play</div>
    </div>
    <div id="inventory">
        <h2>Inventory</h2>
        <div class="inventory-grid"></div>
    </div>
    
    <div id="health-bar"></div>
    <div id="food-bar"></div>
    
    <div id="crafting-ui">
        <span class="crafting-close">×</span>
        <h2>Crafting</h2>
        <div class="crafting-grid"></div>
        <div class="craft-result">
            <div class="result-slot"></div>
        </div>
    </div>
    
    <div id="furnace-ui">
        <span class="furnace-close">×</span>
        <h2>Furnace</h2>
        <div class="furnace-slots">
            <div class="furnace-slot" id="furnace-input"></div>
            <div class="furnace-fire">
                <div class="fire-icon"></div>
            </div>
            <div class="furnace-slot" id="furnace-fuel"></div>
            <div class="furnace-slot" id="furnace-output"></div>
        </div>
        <div class="furnace-progress">
            <div class="furnace-progress-fill"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
